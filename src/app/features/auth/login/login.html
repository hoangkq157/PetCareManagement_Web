<div class="login-wrap">
  <div class="login-card">
    <div class="logo">🐾</div>
    <h4>PetCare</h4>
    <p class="sub">Đăng nhập để tiếp tục</p>

    <!-- Hiển thị lỗi trả về từ API hoặc validate client -->
    @if (error()) {
      <div class="alert-err">{{ error() }}</div>
    }

    <!-- Email -->
    <label for="email">Email</label>
    <input
      id="email"
      type="email"
      placeholder="email@example.com"
      [value]="email()"
      (input)="email.set($any($event.target).value)"
      (keyup.enter)="login()"
      [disabled]="loading()"
      autocomplete="email"
    >

    <!-- Mật khẩu + nút toggle hiện/ẩn -->
    <label for="matkhau">Mật khẩu</label>
    <div class="pass-wrap">
      <input
        id="matkhau"
        [type]="showPass() ? 'text' : 'password'"
        placeholder="••••••"
        [value]="matKhau()"
        (input)="matKhau.set($any($event.target).value)"
        (keyup.enter)="login()"
        [disabled]="loading()"
        autocomplete="current-password"
      >
      <button type="button" class="btn-eye" (click)="toggleShowPass()" tabindex="-1">
        {{ showPass() ? '🙈' : '👁️' }}
      </button>
    </div>

    <!-- Nút đăng nhập — disable khi đang loading để tránh double-submit -->
    <button class="btn-primary" (click)="login()" [disabled]="loading()">
      @if (loading()) {
        <span class="spinner"></span> Đang đăng nhập...
      } @else {
        Đăng nhập
      }
    </button>

    <div class="link-row">
      Chưa có tài khoản?
      <a routerLink="/register">Đăng ký ngay</a>
    </div>
  </div>
</div>
