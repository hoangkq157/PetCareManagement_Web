<div class="login-wrap">
  <div class="login-card">
    <div class="logo">🐾</div>
    <h4>PetCare</h4>
    <p class="sub">Đăng nhập để tiếp tục</p>

    <!-- Hiển thị lỗi trả về từ API hoặc validate client -->
    @if (error()) {
      <div class="alert-err">{{ error() }}</div>
    }
    @if (success()) {
      <div class="alert-success">{{ success() }}</div>
    }
    
    <!-- Email -->
    <label for="email">Email</label>
    <input
      id="email"
      type="email"
      placeholder="email@example.com"
      [value]="email()"
      (input)="email.set($any($event.target).value)"
      (keyup.enter)="login()"
      [disabled]="loading()"
      autocomplete="email"
    >

    <!-- Mật khẩu + nút toggle hiện/ẩn -->
    <label for="matkhau">Mật khẩu</label>
    <div class="pass-wrap">
      <input
        id="matkhau"
        [type]="showPass() ? 'text' : 'password'"
        placeholder="••••••"
        [value]="matKhau()"
        (input)="matKhau.set($any($event.target).value)"
        (keyup.enter)="login()"
        [disabled]="loading()"
        autocomplete="current-password"
      >
      <button type="button" class="btn-eye" (click)="toggleShowPass()" tabindex="-1">
        {{ showPass() ? '🙈' : '👁️' }}
      </button>
    </div>

    <!-- Nút đăng nhập — disable khi đang loading để tránh double-submit -->
    <button class="btn-primary" (click)="login()" [disabled]="loading()">
      @if (loading()) {
        <span class="spinner"></span> Đang đăng nhập...
      } @else {
        Đăng nhập
      }
    </button>

    <!-- Divider -->
  <div style="display:flex;align-items:center;gap:8px;margin:14px 0;color:#999;font-size:13px">
    <hr style="flex:1;border:none;border-top:1px solid #e0e0e0">
    <span>hoặc</span>
    <hr style="flex:1;border:none;border-top:1px solid #e0e0e0">
  </div>

  <!-- Nút Google -->
  <button type="button" class="btn-google" (click)="loginWithGoogle()" [disabled]="loading()">
    <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg"
        width="18" height="18" alt="">
    Đăng nhập bằng Google
  </button>
    <div class="link-row">
      Chưa có tài khoản?
      <a routerLink="/register">Đăng ký ngay</a>
    </div>
    <div class="link-row" style="margin-top: 0">
      <a routerLink="/quenmatkhau">Quên mật khẩu?</a>
    </div>
  </div>
</div>
