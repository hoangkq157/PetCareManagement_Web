<div class="forgot-wrap">
  <div class="forgot-card">
    <div class="logo">🔑</div>
    <h4>Quên mật khẩu</h4>
    <p class="sub">Nhập email để nhận mã OTP</p>

    <div class="step-indicator">
      <span class="active">1</span> Nhập email
      <span>2</span> Xác minh OTP
      <span>3</span> Mật khẩu mới
    </div>

    @if (error()) {
      <div class="alert-err">{{ error() }}</div>
    }

    @if (success()) {
      <div class="alert-success">{{ success() }}</div>
      <button class="btn-primary" (click)="tiepTuc()">
        Nhập mã OTP →
      </button>
    } @else {
      <label for="email">Email tài khoản</label>
      <input
        id="email"
        type="email"
        placeholder="example@petcare.com"
        [value]="email()"
        (input)="email.set($any($event.target).value)"
        (keyup.enter)="guiOtp()"
        [disabled]="loading()"
        autocomplete="email"
        autofocus
      >
      <div class="hint">Mã OTP gồm 6 số sẽ được gửi về email này.</div>

      <button class="btn-primary" (click)="guiOtp()" [disabled]="loading()">
        @if (loading()) {
          <span class="spinner"></span> Đang gửi...
        } @else {
          Gửi mã OTP
        }
      </button>
    }

    <div class="link-row">
      <a routerLink="/login">← Quay lại đăng nhập</a>
    </div>
  </div>
</div>
