<div class="reset-wrap">
  <div class="reset-card">
    <div class="logo">🔒</div>
    <h4>Đặt lại mật khẩu</h4>
    <p class="sub">Tạo mật khẩu mới cho tài khoản</p>

    <div class="step-indicator">
      <span class="done">✓</span> Nhập email
      <span class="done">✓</span> Xác minh OTP
      <span class="active">3</span> Mật khẩu mới
    </div>

    @if (error()) {
      <div class="alert-err">{{ error() }}</div>
    }

    <!-- Mật khẩu mới -->
    <label for="matkhaumoi">Mật khẩu mới</label>
    <div class="pass-wrap">
      <input
        id="matkhaumoi"
        [type]="showPass() ? 'text' : 'password'"
        placeholder="Ít nhất 6 ký tự"
        [value]="matKhauMoi()"
        (input)="matKhauMoi.set($any($event.target).value)"
        [disabled]="loading()"
        autocomplete="new-password"
        autofocus
      >
      <button type="button" class="btn-eye" (click)="toggleShowPass()" tabindex="-1">
        {{ showPass() ? '🙈' : '👁️' }}
      </button>
    </div>

    @if (matKhauMoi()) {
      <div class="strength-bar-bg">
        <div class="strength-bar"
             [style.width.%]="doManhMatKhau.percent"
             [style.background]="doManhMatKhau.color"></div>
      </div>
      <div class="strength-text" [style.color]="doManhMatKhau.color">
        Độ mạnh: {{ doManhMatKhau.label }}
      </div>
    }

    <!-- Xác nhận mật khẩu -->
    <label for="xacnhan">Xác nhận mật khẩu mới</label>
    <div class="pass-wrap">
      <input
        id="xacnhan"
        [type]="showXacNhan() ? 'text' : 'password'"
        placeholder="Nhập lại mật khẩu"
        [value]="xacNhanMatKhau()"
        (input)="xacNhanMatKhau.set($any($event.target).value)"
        (keyup.enter)="datLai()"
        [disabled]="loading()"
        autocomplete="new-password"
      >
      <button type="button" class="btn-eye" (click)="toggleShowXacNhan()" tabindex="-1">
        {{ showXacNhan() ? '🙈' : '👁️' }}
      </button>
    </div>

    <button class="btn-primary" (click)="datLai()" [disabled]="loading()">
      @if (loading()) {
        <span class="spinner"></span> Đang lưu...
      } @else {
        ✅ Đặt lại mật khẩu
      }
    </button>
  </div>
</div>
