<div class="page-wrap">
  <div class="page-header">
    <h1 class="page-title">{{ editId() ? '✏️ Sửa thú cưng' : '🐾 Thêm thú cưng' }}</h1>
    <a routerLink="/admin/thu-cung" class="btn btn-secondary">← Quay lại</a>
  </div>

  @if (loadingData()) {
    <div class="empty-state"><div class="spinner"></div></div>
  } @else {
    @if (error()) { <div class="alert-err">{{ error() }}</div> }

    <div class="form-card">
      <div class="form-grid">
        <div class="form-group">
          <label class="form-label">Chủ nuôi <span class="required">*</span></label>
          <select class="form-input filter-select"
            [value]="maCN()"
            (change)="maCN.set(+$any($event.target).value)">
            <option value="0" disabled>-- Chọn chủ nuôi --</option>
            @for (cn of chuNuois(); track cn.maCN) {
              <option [value]="cn.maCN">{{ cn.hoTen }} ({{ cn.email }})</option>
            }
          </select>
        </div>

        <div class="form-group">
          <label class="form-label">Tên thú cưng <span class="required">*</span></label>
          <input class="form-input" placeholder="VD: Bông"
            [value]="tenThuCung()" (input)="tenThuCung.set($any($event.target).value)">
        </div>

        <div class="form-group">
          <label class="form-label">Loài <span class="required">*</span></label>
          <select class="form-input filter-select"
            [value]="loai()"
            (change)="loai.set($any($event.target).value)">
            @for (l of loaiOptions; track l) {
              <option [value]="l">{{ l }}</option>
            }
          </select>
        </div>

        <div class="form-group">
          <label class="form-label">Giống <span class="optional-tag">(tuỳ chọn)</span></label>
          <input class="form-input" placeholder="VD: Poodle"
            [value]="giong()" (input)="giong.set($any($event.target).value)">
        </div>

        <div class="form-group">
          <label class="form-label">Ngày sinh <span class="optional-tag">(tuỳ chọn)</span></label>
          <input type="date" class="form-input"
            [value]="ngaySinh()" (change)="ngaySinh.set($any($event.target).value)">
        </div>

        <div class="form-group">
          <label class="form-label">Cân nặng (kg) <span class="optional-tag">(tuỳ chọn)</span></label>
          <input type="number" class="form-input" placeholder="VD: 3.5" step="0.1"
            [value]="canNang()" (input)="canNang.set($any($event.target).value)">
        </div>

        <div class="form-group">
          <label class="form-label">Màu lông <span class="optional-tag">(tuỳ chọn)</span></label>
          <input class="form-input" placeholder="VD: Trắng"
            [value]="mauLong()" (input)="mauLong.set($any($event.target).value)">
        </div>

        <div class="form-group full">
          <label class="form-label">Ghi chú <span class="optional-tag">(tuỳ chọn)</span></label>
          <textarea class="form-input" rows="3" placeholder="Ghi chú thêm..."
            [value]="ghiChu()" (input)="ghiChu.set($any($event.target).value)"></textarea>
        </div>
      </div>

      <div class="form-actions" style="margin-top:20px;">
        <button class="btn btn-primary" (click)="submit()" [disabled]="loading()">
          @if (loading()) { <span class="spinner spinner-white"></span> }
          {{ editId() ? 'Cập nhật' : 'Thêm mới' }}
        </button>
        <a routerLink="/admin/thu-cung" class="btn btn-secondary">Huỷ</a>
      </div>
    </div>
  }
</div>
